<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login – Smart Hospital</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.10);
            padding: 48px 40px 40px;
            width: 100%;
            max-width: 420px;
        }
        .logo {
            text-align: center;
            margin-bottom: 28px;
        }
        .logo .icon {
            width: 56px; height: 56px;
            background: #1565C0;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 12px;
            font-size: 26px; color: #fff;
        }
        .logo h1 { font-size: 22px; color: #0D2B4E; font-weight: 700; }
        .logo p  { font-size: 13px; color: #6b7280; margin-top: 4px; }

        .alert-error {
            background: #FEE2E2; color: #991B1B;
            border: 1px solid #FCA5A5;
            border-radius: 8px; padding: 10px 14px;
            font-size: 13px; margin-bottom: 20px;
        }
        .alert-success {
            background: #D1FAE5; color: #065F46;
            border: 1px solid #6EE7B7;
            border-radius: 8px; padding: 10px 14px;
            font-size: 13px; margin-bottom: 20px;
        }

        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
        input[type="email"],
        input[type="password"] {
            width: 100%; padding: 10px 14px;
            border: 1.5px solid #D1D5DB;
            border-radius: 8px; font-size: 14px; color: #111827;
            outline: none; transition: border-color 0.2s;
        }
        input:focus { border-color: #1565C0; }

        .btn-primary {
            width: 100%; padding: 12px;
            background: #1565C0; color: #fff;
            border: none; border-radius: 8px;
            font-size: 15px; font-weight: 600;
            cursor: pointer; transition: background 0.2s;
            margin-top: 4px;
        }
        .btn-primary:hover { background: #0D47A1; }

        .divider { text-align: center; margin: 20px 0; color: #9CA3AF; font-size: 13px; }

        .register-link {
            text-align: center; font-size: 13px; color: #6B7280;
        }
        .register-link a { color: #1565C0; font-weight: 600; text-decoration: none; }
        .register-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">
        <div class="icon">+</div>
        <h1>Smart Hospital</h1>
        <p>Management System</p>
    </div>

    <!-- Error message -->
    <div class="alert-error" th:if="${error}" th:text="${error}"></div>

    <!-- Success message (e.g. after registration) -->
    <div class="alert-success" th:if="${success}" th:text="${success}"></div>

    <form th:action="@{/login}" method="post">
        <!-- CSRF token removed as Spring Security is not configured -->

        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="username"
                   placeholder="you@example.com" required/>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password"
                   placeholder="Enter your password" required/>
        </div>

        <button type="submit" class="btn-primary">Sign In</button>
    </form>

    <div class="divider">— or —</div>

    <div class="register-link">
        Don't have an account? <a th:href="@{/register}">Register here</a>
    </div>
</div>
</body>
</html>
